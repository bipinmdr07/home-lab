services:
  minio:
    image: quay.io/minio/aistor/minio:latest
    container_name: minio
    restart: always
    ports:
      - 9009:9000 # S3 API port
      - 9001:9001 # Web console port
    volumes:
      - ${MINIO_DATA_PATH}/:/data
      - ${MINIO_LICENSE_PATH}:/minio.license:ro
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - TZ=${TZ}
    command: server /data --console-address ":9001" --license /minio.license
    labels:
      - caddy=minio.${DOMAIN:-orangepi2.box}
      - caddy.tls=internal
      - caddy.reverse_proxy={{upstreams 9001}}
      - homepage.group=Storage
      - homepage.name=minio
      - homepage.icon=si-minio
      - homepage.href=https://minio.${DOMAIN:-orangepi2.box}
