# Official diagrams.net / draw.io image (Tomcat on 8080). TLS is handled by Caddy; set DRAWIO_SERVER_URL
# so embeds and “open in new” links use your real hostname instead of localhost.
services:
  drawio:
    image: jgraph/drawio:latest
    container_name: drawio
    restart: always
    ports:
      - "8086:8080"
    environment:
      - LETS_ENCRYPT_ENABLED=false
      - DRAWIO_SERVER_URL=https://drawio.${DOMAIN:-orangepi2.box}
    labels:
      - caddy=drawio.${DOMAIN:-orangepi2.box}
      - caddy.tls=internal
      - caddy.reverse_proxy={{upstreams 8080}}
      - homepage.group=Tools
      - homepage.name=Draw.io
      - homepage.icon=mdi-chart-scatter-plot
      - homepage.href=https://drawio.${DOMAIN:-orangepi2.box}
      - homepage.description=Diagrams and whiteboards
